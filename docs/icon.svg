<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="strand1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="strand2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06B6D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0EA5E9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="basepair" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:0.6" />
      <stop offset="50%" style="stop-color:#A78BFA;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:0.6" />
    </linearGradient>
    <linearGradient id="unwound1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A78BFA;stop-opacity:0.5" />
    </linearGradient>
    <linearGradient id="unwound2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0EA5E9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#67E8F9;stop-opacity:0.5" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="128" cy="128" r="120" fill="none" stroke="#E5E7EB" stroke-width="1.5" opacity="0.3"/>

  <!-- Double helix - wound portion (bottom 60%) -->
  <!-- Strand 1 (left-winding) -->
  <path d="M 88,230
           C 88,210 168,200 168,180
           C 168,160 88,150 88,130
           C 88,110 168,100 168,80"
        fill="none" stroke="url(#strand1)" stroke-width="6" stroke-linecap="round"/>

  <!-- Strand 2 (right-winding) -->
  <path d="M 168,230
           C 168,210 88,200 88,180
           C 88,160 168,150 168,130
           C 168,110 88,100 88,80"
        fill="none" stroke="url(#strand2)" stroke-width="6" stroke-linecap="round"/>

  <!-- Base pairs (horizontal rungs) - wound portion -->
  <line x1="104" y1="222" x2="152" y2="222" stroke="url(#basepair)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="91" y1="205" x2="165" y2="205" stroke="url(#basepair)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="128" y1="190" x2="128" y2="190" stroke="url(#basepair)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="165" y1="180" x2="91" y2="180" stroke="url(#basepair)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="155" y1="165" x2="101" y2="165" stroke="url(#basepair)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="92" y1="152" x2="164" y2="152" stroke="url(#basepair)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="93" y1="137" x2="163" y2="137" stroke="url(#basepair)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="140" y1="120" x2="116" y2="120" stroke="url(#basepair)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="163" y1="108" x2="93" y2="108" stroke="url(#basepair)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="152" y1="93" x2="104" y2="93" stroke="url(#basepair)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Unwound portion (top 30%) - strands separate -->
  <!-- Strand 1 unwinding upward-left -->
  <path d="M 168,80
           C 158,65 130,55 105,35
           C 95,28 80,22 70,18"
        fill="none" stroke="url(#unwound1)" stroke-width="5" stroke-linecap="round"
        stroke-dasharray="none" opacity="0.85"/>

  <!-- Strand 2 unwinding upward-right -->
  <path d="M 88,80
           C 98,65 126,55 151,35
           C 161,28 176,22 186,18"
        fill="none" stroke="url(#unwound2)" stroke-width="5" stroke-linecap="round"
        stroke-dasharray="none" opacity="0.85"/>

  <!-- Small dots at unwound strand tips (like nucleotides floating free) -->
  <circle cx="67" cy="16" r="3.5" fill="#A78BFA" opacity="0.7"/>
  <circle cx="189" cy="16" r="3.5" fill="#67E8F9" opacity="0.7"/>

  <!-- Partial base pairs in transition zone (breaking apart) -->
  <line x1="143" y1="82" x2="113" y2="82" stroke="url(#basepair)" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="150" y1="70" x2="125" y2="68" stroke="url(#basepair)" stroke-width="1.5" stroke-linecap="round" opacity="0.3" stroke-dasharray="3,3"/>
  <line x1="155" y1="58" x2="135" y2="55" stroke="url(#basepair)" stroke-width="1" stroke-linecap="round" opacity="0.15" stroke-dasharray="2,4"/>

  <!-- Subtle glow effect behind the fork -->
  <circle cx="128" cy="78" r="18" fill="#A78BFA" opacity="0.06"/>
</svg>
