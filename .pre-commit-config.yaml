repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: no-commit-to-branch
        args: ['--branch', 'main']

  - repo: local
    hooks:
      - id: forbid-os-files
        name: Block OS-generated files
        entry: >-
          bash -c 'FOUND=$(git diff --cached --name-only --diff-filter=ACR |
          grep -E "(\.DS_Store|Thumbs\.db|desktop\.ini)$" || true);
          if [ -n "$FOUND" ]; then
          echo "Blocked OS-generated files from commit:";
          echo "$FOUND";
          echo "Run: git rm --cached <file>";
          exit 1; fi'
        language: system
        always_run: true
        pass_filenames: false

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.14.1
    hooks:
      - id: mypy
        additional_dependencies: [pydantic, httpx]
        args: [--ignore-missing-imports]
        files: ^src/
